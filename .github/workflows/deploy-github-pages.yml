# 推送到 main/master 后构建并发布到 GitHub Pages
# 首次使用：仓库 Settings → Pages → Build and deployment → Source 选「GitHub Actions」
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  # Pages 首次在 Settings 里改为「GitHub Actions」后，可对失败记录点 Re-run；也可用此入口手动部署
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # 与 vite.config 中 base 一致：必须是 /你的仓库名/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # 仓库 Settings → Secrets 中配置以下三项（均可选）
          # API_KEY: 大模型 API 密钥；配置后用户无需手动填写即可使用 LLM 文案
          # API_BASE_URL: OpenAI 兼容端点，如 https://api.openai.com/v1
          # API_MODEL: 默认模型名，如 gpt-4o-mini
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_MODEL: ${{ secrets.API_MODEL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
